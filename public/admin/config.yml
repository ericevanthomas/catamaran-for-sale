backend:
  name: github
  repo: ericevanthomas/catamaran-for-sale
  branch: main
  base_url: https://sveltia-cms-auth.emw-auth.workers.dev

media_folder: public/images
public_folder: /images

site_url: https://www.catamaran-for-sale.com
display_url: https://www.catamaran-for-sale.com

collections:
  # Features — the core content collection (feature cards)
  - name: features
    label: Feature Cards
    label_singular: Feature Card
    folder: src/content/features
    create: true
    slug: "{{slug}}"
    summary: "{{title}}{{draft | ternary(' — DRAFT', '')}}"
    sortable_fields:
      fields: [order, title, draft]
      default:
        field: order
        direction: ascending
    view_filters:
      - { label: "Published only", field: draft, pattern: false }
      - { label: "Drafts only", field: draft, pattern: true }
      - { label: "Featured only", field: featured, pattern: true }
    view_groups:
      - { label: "Status (Published / Draft)", field: draft }
      - { label: Category, field: category }
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: markdown }
      - label: Photos
        name: photos
        widget: list
        field: { label: Photo, name: photo, widget: image }
      - { label: Video URL, name: video, widget: string, required: false,
          hint: "Bunny Stream embed URL" }
      - { label: Display Order, name: order, widget: number, value_type: int }
      - { label: "Featured (What We Love)", name: featured, widget: boolean, default: false }
      - { label: "Draft (hide from live site)", name: draft, widget: boolean, default: false,
          hint: "Toggle on to unpublish this card. It stays in Sveltia but won't render on the site." }
      - label: Category
        name: category
        widget: select
        required: false
        options:
          - Sailing Performance
          - Living Spaces
          - Systems & Equipment
          - Safety
          - Electrical
          - Plumbing
          - Navigation
          - Rigging & Sails
          - Dinghy & Tender
          - Recent Upgrades
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Body, name: body, widget: markdown }

  # FAQs
  - name: faq
    label: FAQs
    label_singular: FAQ
    folder: src/content/faq
    create: true
    slug: "{{slug}}"
    sortable_fields:
      fields: [order, question]
      default:
        field: order
        direction: ascending
    fields:
      - { label: Question, name: question, widget: string }
      - { label: Answer, name: answer, widget: text }
      - { label: Display Order, name: order, widget: number, value_type: int }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }

  # Photo Library — one entry per photo in the media folder.
  # Source of truth for caption + alt text surfaced on gallery page and feature cards.
  - name: gallery
    label: Photo Library
    label_singular: Photo
    folder: src/content/gallery
    create: true
    slug: "{{slug}}"
    summary: "{{caption | default(alt)}}{{inGallery | ternary('', ' — hidden from gallery')}}"
    sortable_fields:
      fields: [order, caption, inGallery]
      default:
        field: order
        direction: ascending
    view_filters:
      - { label: "Shown on gallery page", field: inGallery, pattern: true }
      - { label: "Hidden from gallery page", field: inGallery, pattern: false }
      - { label: "Missing caption", field: caption, pattern: '^$' }
    fields:
      - { label: Image, name: image, widget: image, hint: "The photo file in the media library" }
      - label: Caption
        name: caption
        widget: markdown
        required: false
        modes: ["rich_text"]
        buttons: ["bold", "italic", "link"]
        editor_components: []
        minimal: true
        hint: "Shown on the gallery page and in feature-card photo slideshows. Links welcome."
      - { label: Alt Text, name: alt, widget: string,
          hint: "Screen-reader description — can be similar to caption" }
      - { label: "Show on /gallery page", name: inGallery, widget: boolean, default: true,
          hint: "Toggle off to keep metadata but hide from the public gallery page" }
      - label: Category
        name: category
        widget: select
        required: false
        options: [Exterior, Interior, Sailing, Aerials, Systems, Lifestyle]
      - { label: Display Order, name: order, widget: number, value_type: int }

  # Specifications
  - name: specs
    label: Specifications
    label_singular: Spec
    folder: src/content/specs
    create: true
    slug: "{{slug}}"
    sortable_fields:
      fields: [order, label]
      default:
        field: order
        direction: ascending
    fields:
      - { label: Label, name: label, widget: string }
      - { label: Value, name: value, widget: string }
      - label: Group
        name: group
        widget: select
        options:
          - Dimensions
          - Performance
          - Engines & Propulsion
          - Tankage
          - Accommodations
          - Construction
      - { label: Display Order, name: order, widget: number, value_type: int }

  # Pages (file-based)
  - name: pages
    label: Pages
    label_singular: Page
    files:
      - label: Homepage
        name: homepage
        file: src/content/pages/homepage.md
        fields:
          - { label: Page Title (SEO), name: title, widget: string }
          - { label: Meta Description (SEO), name: description, widget: string }

          # ═════════════════════════════════════════════
          # HERO SECTION
          # ═════════════════════════════════════════════
          - label: "Hero Section"
            name: hero
            widget: object
            collapsed: true
            summary: "{{fields.headline}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false,
                  hint: "Small text above the headline" }
              - { label: Headline (full, SEO), name: headline, widget: string,
                  hint: "Used in page metadata and SEO" }
              - label: "Headline Lines (visible, one per line)"
                name: headlineLines
                widget: list
                required: false
                field: { label: Line, name: line, widget: string }
              - { label: Subheadline, name: subheadline, widget: text }
              - { label: Hero Image, name: image, widget: image }
              - { label: CTA Button Text, name: ctaText, widget: string, required: false }
              - { label: CTA Button Link, name: ctaLink, widget: string, required: false }

          # ═════════════════════════════════════════════
          # AT A GLANCE
          # ═════════════════════════════════════════════
          - label: "At A Glance"
            name: glance
            widget: object
            collapsed: true
            fields:
              - { label: "Price Display (used in hero)", name: priceDisplay, widget: string }
              - { label: "Location Display (used in hero)", name: locationDisplay, widget: string }
              - label: "Grid Items (8 boxes in the spec grid)"
                name: items
                widget: list
                collapsed: true
                summary: "{{fields.label}}: {{fields.value}}"
                fields:
                  - { label: Label, name: label, widget: string, hint: "e.g., Year, Length, Asking Price" }
                  - { label: Value, name: value, widget: string, hint: "e.g., 2010, 50 ft, $379,000" }
              - { label: "Footer Note", name: note, widget: text, required: false,
                  hint: "Short sentence under the grid summarizing upgrades" }
              - { label: "Footer Link Text", name: linkText, widget: string, required: false }
              - { label: "Footer Link URL", name: linkUrl, widget: string, required: false }

          # ═════════════════════════════════════════════
          # TOP PHOTO STRIP (3 photos under the hero)
          # ═════════════════════════════════════════════
          - label: "Top Photo Strip (3 photos under the hero)"
            name: topPhotos
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.alt}}"
            max: 3
            min: 3
            fields:
              - { label: Image, name: image, widget: image }
              - { label: Alt Text, name: alt, widget: string,
                  hint: "What the photo shows (for screen readers and SEO)" }

          # ═════════════════════════════════════════════
          # WHY WE CHOSE THIS BOAT (intro)
          # ═════════════════════════════════════════════
          - label: "Why We Chose This Boat (intro block)"
            name: whyChose
            widget: object
            collapsed: true
            summary: "{{fields.heading}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string, required: false }
              - label: Body
                name: body
                widget: markdown
                required: false
                modes: ["rich_text", "raw"]
                buttons: ["bold", "italic", "link"]

          # ═════════════════════════════════════════════
          # RECENT UPGRADES
          # ═════════════════════════════════════════════
          - label: "Recent Upgrades Section"
            name: upgradesSection
            widget: object
            collapsed: true
            summary: "{{fields.heading}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string, required: false }
              - label: "Upgrade Items"
                name: items
                widget: list
                required: false
                collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - { label: Title, name: title, widget: string }
                  - label: Body
                    name: body
                    widget: markdown
                    modes: ["rich_text", "raw"]
                    buttons: ["bold", "italic", "link"]

          # ═════════════════════════════════════════════
          # ALTERNATING STORY SECTIONS
          # ═════════════════════════════════════════════
          - label: "Alternating Story Sections (3 'Why We Chose' stories)"
            name: alternatingSections
            widget: list
            required: false
            collapsed: true
            summary: "{{fields.heading}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Heading, name: heading, widget: string }
              - label: Body
                name: body
                widget: markdown
                modes: ["rich_text", "raw"]
                buttons: ["bold", "italic", "link"]
              - { label: Image, name: image, widget: image,
                  hint: "Pick any image from the media library — square works best" }

          # ═════════════════════════════════════════════
          # KEY EQUIPMENT (bullet list)
          # ═════════════════════════════════════════════
          - label: "Key Equipment"
            name: highlights
            widget: object
            collapsed: true
            summary: "{{fields.heading}}"
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string, required: false }
              - label: Bullets
                name: bullets
                widget: list
                field: { label: Bullet, name: bullet, widget: string }

          # ═════════════════════════════════════════════
          # BOTTOM CTA
          # ═════════════════════════════════════════════
          - label: "Bottom CTA"
            name: bottomCta
            widget: object
            collapsed: true
            summary: "{{fields.headline}}"
            fields:
              - { label: Headline, name: headline, widget: string, required: false }
              - label: Body
                name: body
                widget: markdown
                required: false
                modes: ["rich_text", "raw"]
                buttons: ["bold", "italic", "link"]
              - { label: Primary Button Text, name: primaryText, widget: string, required: false }
              - { label: Primary Button Link, name: primaryLink, widget: string, required: false }
              - { label: Secondary Button Text, name: secondaryText, widget: string, required: false }
              - { label: Secondary Button Link, name: secondaryLink, widget: string, required: false }

      - label: About Us
        name: about
        file: src/content/pages/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Meta Description, name: description, widget: string }
          - { label: Body, name: body, widget: markdown }

      - label: The Transaction
        name: transaction
        file: src/content/pages/transaction.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Meta Description, name: description, widget: string }
          - { label: Body, name: body, widget: markdown }

      - label: Contact
        name: contact
        file: src/content/pages/contact.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Meta Description, name: description, widget: string }
          - { label: Body, name: body, widget: markdown }
