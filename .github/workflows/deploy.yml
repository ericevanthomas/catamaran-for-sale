name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Cache generated image variants
        uses: actions/cache@v4
        with:
          path: public/_img
          key: img-variants-${{ hashFiles('public/images/**') }}
          restore-keys: |
            img-variants-
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d16ec3605dcb1943fa23f47f39841077
          command: pages deploy dist --project-name catamaran-for-sale
